<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="monospace" font-size="12">
  <title>Pi Zero 2W GPIO Pinout for ArduPilot + HELLBENDER</title>

  <!-- Background -->
  <rect width="720" height="520" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Pi Zero 2W GPIO Pinout — ArduPilot + HELLBENDER_0001</text>
  <text x="360" y="48" text-anchor="middle" fill="#888" font-size="11">Active pins for CRSF, SBUS RC Input, NeoPixel LEDs, and Power</text>

  <!-- Board outline -->
  <rect x="200" y="65" width="320" height="385" fill="#2d5016" rx="12" stroke="#4a7a28" stroke-width="2"/>
  <text x="360" y="88" text-anchor="middle" fill="#8cbf4a" font-size="11">Raspberry Pi Zero 2W</text>
  <text x="360" y="102" text-anchor="middle" fill="#6a9a38" font-size="9">(component side up, USB ports at bottom)</text>

  <!-- USB/HDMI ports at bottom -->
  <rect x="250" y="420" width="40" height="18" fill="#555" rx="3" stroke="#777" stroke-width="1"/>
  <text x="270" y="432" text-anchor="middle" fill="#ccc" font-size="7">USB</text>
  <rect x="310" y="420" width="40" height="18" fill="#555" rx="3" stroke="#777" stroke-width="1"/>
  <text x="330" y="432" text-anchor="middle" fill="#ccc" font-size="7">USB</text>
  <rect x="380" y="420" width="50" height="14" fill="#555" rx="2" stroke="#777" stroke-width="1"/>
  <text x="405" y="430" text-anchor="middle" fill="#ccc" font-size="7">HDMI</text>

  <!-- Pin header background -->
  <rect x="280" y="110" width="160" height="295" fill="#1e3a0e" rx="4" stroke="#3a6a1e" stroke-width="1"/>

  <!-- Column headers -->
  <text x="320" y="126" text-anchor="middle" fill="#aaa" font-size="10" font-weight="bold">Odd</text>
  <text x="400" y="126" text-anchor="middle" fill="#aaa" font-size="10" font-weight="bold">Even</text>

  <!-- Pin rows - y starts at 138, spacing 19 -->
  <!-- Row 1: Pin 1 (3V3) / Pin 2 (5V) -->
  <circle cx="320" cy="143" r="8" fill="#555"/>
  <text x="320" y="147" text-anchor="middle" fill="#ddd" font-size="9">1</text>
  <circle cx="400" cy="143" r="8" fill="#ff3333" stroke="#ff6666" stroke-width="2"/>
  <text x="400" y="147" text-anchor="middle" fill="#fff" font-size="9">2</text>

  <!-- Row 2: Pin 3 (SDA) / Pin 4 (5V) -->
  <circle cx="320" cy="162" r="8" fill="#555"/>
  <text x="320" y="166" text-anchor="middle" fill="#ddd" font-size="9">3</text>
  <circle cx="400" cy="162" r="8" fill="#ff3333" stroke="#ff6666" stroke-width="2"/>
  <text x="400" y="166" text-anchor="middle" fill="#fff" font-size="9">4</text>

  <!-- Row 3: Pin 5 (SCL) / Pin 6 (GND) -->
  <circle cx="320" cy="181" r="8" fill="#555"/>
  <text x="320" y="185" text-anchor="middle" fill="#ddd" font-size="9">5</text>
  <circle cx="400" cy="181" r="8" fill="#222" stroke="#888" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" fill="#fff" font-size="9">6</text>

  <!-- Row 4: Pin 7 (GPIO4) / Pin 8 (GPIO14 TX) -->
  <circle cx="320" cy="200" r="8" fill="#33aaff" stroke="#66ccff" stroke-width="2"/>
  <text x="320" y="204" text-anchor="middle" fill="#fff" font-size="9">7</text>
  <circle cx="400" cy="200" r="8" fill="#ffaa00" stroke="#ffcc44" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" fill="#fff" font-size="9">8</text>

  <!-- Row 5: Pin 9 (GND) / Pin 10 (GPIO15 RX) -->
  <circle cx="320" cy="219" r="8" fill="#555"/>
  <text x="320" y="223" text-anchor="middle" fill="#ddd" font-size="9">9</text>
  <circle cx="400" cy="219" r="8" fill="#ffaa00" stroke="#ffcc44" stroke-width="2"/>
  <text x="400" y="223" text-anchor="middle" fill="#fff" font-size="8">10</text>

  <!-- Row 6-9: Pins 11-18 (unused) -->
  <circle cx="320" cy="238" r="8" fill="#555"/>
  <text x="320" y="242" text-anchor="middle" fill="#ddd" font-size="8">11</text>
  <circle cx="400" cy="238" r="8" fill="#555"/>
  <text x="400" y="242" text-anchor="middle" fill="#ddd" font-size="8">12</text>

  <circle cx="320" cy="257" r="8" fill="#555"/>
  <text x="320" y="261" text-anchor="middle" fill="#ddd" font-size="8">13</text>
  <circle cx="400" cy="257" r="8" fill="#555"/>
  <text x="400" y="261" text-anchor="middle" fill="#ddd" font-size="8">14</text>

  <circle cx="320" cy="276" r="8" fill="#555"/>
  <text x="320" y="280" text-anchor="middle" fill="#ddd" font-size="8">15</text>
  <circle cx="400" cy="276" r="8" fill="#555"/>
  <text x="400" y="280" text-anchor="middle" fill="#ddd" font-size="8">16</text>

  <circle cx="320" cy="295" r="8" fill="#555"/>
  <text x="320" y="299" text-anchor="middle" fill="#ddd" font-size="8">17</text>
  <circle cx="400" cy="295" r="8" fill="#555"/>
  <text x="400" y="299" text-anchor="middle" fill="#ddd" font-size="8">18</text>

  <!-- Row 10: Pin 19 (GPIO10 SPI MOSI) / Pin 20 (GND) -->
  <circle cx="320" cy="314" r="8" fill="#aa33ff" stroke="#cc66ff" stroke-width="2"/>
  <text x="320" y="318" text-anchor="middle" fill="#fff" font-size="8">19</text>
  <circle cx="400" cy="314" r="8" fill="#555"/>
  <text x="400" y="318" text-anchor="middle" fill="#ddd" font-size="8">20</text>

  <!-- Rows 11-20: Pins 21-40 (unused) -->
  <circle cx="320" cy="333" r="8" fill="#555"/>
  <text x="320" y="337" text-anchor="middle" fill="#ddd" font-size="8">21</text>
  <circle cx="400" cy="333" r="8" fill="#555"/>
  <text x="400" y="337" text-anchor="middle" fill="#ddd" font-size="8">22</text>

  <circle cx="320" cy="352" r="8" fill="#555"/>
  <text x="320" y="356" text-anchor="middle" fill="#ddd" font-size="8">23</text>
  <circle cx="400" cy="352" r="8" fill="#555"/>
  <text x="400" y="356" text-anchor="middle" fill="#ddd" font-size="8">24</text>

  <circle cx="320" cy="371" r="8" fill="#555"/>
  <text x="320" y="375" text-anchor="middle" fill="#ddd" font-size="8">25</text>
  <circle cx="400" cy="371" r="8" fill="#555"/>
  <text x="400" y="375" text-anchor="middle" fill="#ddd" font-size="8">26</text>

  <circle cx="320" cy="390" r="8" fill="#555"/>
  <text x="320" y="394" text-anchor="middle" fill="#ddd" font-size="8">27</text>
  <circle cx="400" cy="390" r="8" fill="#555"/>
  <text x="400" y="394" text-anchor="middle" fill="#ddd" font-size="8">28</text>

  <!-- Left-side labels (odd pins) -->
  <text x="195" y="147" text-anchor="end" fill="#999" font-size="10">3V3 Power</text>
  <text x="195" y="166" text-anchor="end" fill="#999" font-size="10">GPIO2 (SDA)</text>
  <text x="195" y="185" text-anchor="end" fill="#999" font-size="10">GPIO3 (SCL)</text>

  <!-- GPIO4 SBUS label with connector line -->
  <line x1="215" y1="200" x2="312" y2="200" stroke="#33aaff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="195" y="204" text-anchor="end" fill="#33aaff" font-size="10" font-weight="bold">GPIO4</text>

  <text x="195" y="223" text-anchor="end" fill="#999" font-size="10">GND</text>

  <!-- GPIO10 NeoPixel label -->
  <line x1="215" y1="314" x2="312" y2="314" stroke="#aa33ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="195" y="318" text-anchor="end" fill="#aa33ff" font-size="10" font-weight="bold">GPIO10</text>

  <!-- Right-side labels (even pins) -->
  <!-- 5V Power -->
  <line x1="408" y1="143" x2="505" y2="143" stroke="#ff3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="510" y="147" fill="#ff3333" font-size="10" font-weight="bold">5V</text>
  <line x1="408" y1="162" x2="505" y2="162" stroke="#ff3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="510" y="166" fill="#ff3333" font-size="10" font-weight="bold">5V</text>

  <!-- GND -->
  <line x1="408" y1="181" x2="505" y2="181" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="510" y="185" fill="#888" font-size="10" font-weight="bold">GND</text>

  <!-- GPIO14 TX -->
  <line x1="408" y1="200" x2="505" y2="200" stroke="#ffaa00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="510" y="204" fill="#ffaa00" font-size="10" font-weight="bold">GPIO14 (TXD)</text>

  <!-- GPIO15 RX -->
  <line x1="408" y1="219" x2="505" y2="219" stroke="#ffaa00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="510" y="223" fill="#ffaa00" font-size="10" font-weight="bold">GPIO15 (RXD)</text>

  <!-- Connection annotations -->
  <!-- J7 CRSF bracket -->
  <line x1="660" y1="135" x2="660" y2="230" stroke="#ffaa00" stroke-width="2"/>
  <line x1="650" y1="135" x2="660" y2="135" stroke="#ffaa00" stroke-width="2"/>
  <line x1="650" y1="230" x2="660" y2="230" stroke="#ffaa00" stroke-width="2"/>
  <text x="668" y="170" fill="#ffaa00" font-size="10" font-weight="bold">to</text>
  <text x="668" y="183" fill="#ffaa00" font-size="10" font-weight="bold">HELLBENDER</text>
  <text x="668" y="196" fill="#ffaa00" font-size="10" font-weight="bold">J7</text>
  <text x="668" y="212" fill="#ffaa00" font-size="9">(CRSF + Power)</text>

  <!-- SBUS annotation -->
  <text x="30" y="196" fill="#33aaff" font-size="10" font-weight="bold">ELRS RX</text>
  <text x="30" y="210" fill="#33aaff" font-size="9">(SBUS Input)</text>

  <!-- NeoPixel annotation -->
  <text x="30" y="310" fill="#aa33ff" font-size="10" font-weight="bold">NeoPixel</text>
  <text x="30" y="324" fill="#aa33ff" font-size="9">(SPI0 MOSI)</text>

  <!-- Legend -->
  <rect x="20" y="455" width="680" height="55" fill="#111122" rx="6" stroke="#333" stroke-width="1"/>
  <text x="40" y="475" fill="#ccc" font-size="11" font-weight="bold">Legend:</text>

  <circle cx="120" cy="471" r="6" fill="#ff3333" stroke="#ff6666" stroke-width="1.5"/>
  <text x="132" y="475" fill="#ff3333" font-size="10">5V Power (from J7)</text>

  <circle cx="270" cy="471" r="6" fill="#222" stroke="#888" stroke-width="1.5"/>
  <text x="282" y="475" fill="#888" font-size="10">GND</text>

  <circle cx="340" cy="471" r="6" fill="#ffaa00" stroke="#ffcc44" stroke-width="1.5"/>
  <text x="352" y="475" fill="#ffaa00" font-size="10">CRSF UART (J7)</text>

  <circle cx="490" cy="471" r="6" fill="#33aaff" stroke="#66ccff" stroke-width="1.5"/>
  <text x="502" y="475" fill="#33aaff" font-size="10">SBUS RC In</text>

  <circle cx="590" cy="471" r="6" fill="#aa33ff" stroke="#cc66ff" stroke-width="1.5"/>
  <text x="602" y="475" fill="#aa33ff" font-size="10">NeoPixel LED</text>

  <circle cx="120" cy="496" r="6" fill="#555"/>
  <text x="132" y="500" fill="#999" font-size="10">Unused</text>

  <text x="250" y="500" fill="#777" font-size="9">Only 6 of 40 pins are used. Header Pin 1 is at the top-left (near board edge).</text>
</svg>